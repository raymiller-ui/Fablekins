<head>

  <meta name="description"
    content="Fablekins is a pixelated browser game. Collect red dots, grab golden power-ups, and escape the ghost before it catches you!">
  <meta name="keywords" content="Fablekins, browser game, pixel art game, dodge ghost, collect dots, arcade game">
  <meta name="author" content="Fablekins">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://fablekins.vercel.app/">

  <!-- Open Graph (Facebook / WhatsApp / LinkedIn previews) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Fablekins – Collect Dots, Dodge the Ghost">
  <meta property="og:description" content="A pixel-art browser game. Collect dots to level up and outrun the ghost!">

  <meta name="twitter:card" content="summary_large_image">

  <link href="/styles.css" type="text/css" rel="stylesheet">
  <link rel="icon" type="image/png" href="/images/logo.png">
</head>

<body>

  <div class="touch-controls">
    <button data-dir="up" class="up">▲</button>
    <button data-dir="left" class="left">◀</button>
    <button data-dir="right" class="right">▶</button>
    <button data-dir="down" class="down">▼</button>
  </div>



  <div class="game-container">
    <canvas class="game-canvas" width="352" height="198"></canvas>
  </div>

  <!-- Scripts -->
  <!-- ORDER VERY IMPORTENT -->

  <!-- Core Utilities -->
  <script src="/Utillities.js"></script>
  <script src="/UI.js"></script>

  <!-- Engine -->
  <script src="/Collision.js"></script>
  <script src="/DirectionInput.js"></script>
  <script src="/Sprite.js"></script>
  <script src="/GameObject.js"></script>

  <!-- Game Objects -->
  <script src="/Person.js"></script>
  <script src="/Ghost.js"></script>
  <script src="/Dot.js"></script>

  <!-- Level System -->
  <script src="/LevelManager.js"></script>

  <!-- World Mapping-->
  <script src="/OverworldMap.js"></script>
  <script src="/Overworld.js"></script>

  <!-- Boot the Engine.... Let's goooo!!! -->
  <script src="/init.js"></script>

</body>

</html>
